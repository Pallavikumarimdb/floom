# Dep Check — proxied-mode (pure HTTP, no docker.sock required).
# Start the upstream first: node examples/dep-check/server.mjs
# Then point Floom at this file via FLOOM_APPS_CONFIG.

apps:
  - slug: dep-check
    type: proxied
    openapi_spec_url: http://localhost:4114/openapi.json
    display_name: Dep Check
    description: "Find dead imports in your project. Clone a public git repo and list any imports that reference files no longer there."
    category: developer-tools
