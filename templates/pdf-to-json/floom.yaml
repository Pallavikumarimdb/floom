name: PDF to JSON
slug: pdf-to-json
runtime: python
entrypoint: handler.py
handler: run
public: true
input_schema:
  type: object
  properties:
    pdf:
      type: string
      title: PDF file
      description: Upload a PDF or paste a URL to one
      format: data-url
    extract:
      type: string
      title: What to extract
      description: >
        What structured data to pull out, e.g. "invoice line items",
        "resume sections", "paper title and authors", "contract clauses"
      default: invoice line items
  required: [pdf]
output_schema:
  type: object
  properties:
    extracted:
      type: object
      description: Structured data extracted from the PDF
    pages:
      type: integer
      description: Number of pages in the PDF
    error:
      type: string
      description: Error message if extraction failed
